apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mlops-api
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/DanielDiazCruz/MLOps-Engineer
    targetRevision: HEAD
    path: argo/k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: mlops
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
